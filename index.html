const BOUNCIE_CLIENT_ID     = 'gogo-autos';
const BOUNCIE_CLIENT_SECRET = 'YGC4FARnn2QWUqvDLuiEws2M7IhTXjB9CDUkPq4ql2Q1vNlyaQ';
const BOUNCIE_REDIRECT_URI  = window.location.origin + window.location.pathname.replace(/\/[^\/]*$/, '') + '/';
const BOUNCIE_AUTH_URL       = 'https://auth.bouncie.com/dialog/authorize';
const BOUNCIE_TOKEN_URL      = 'https://auth.bouncie.dev/oauth/token';
const BOUNCIE_API_URL        = 'https://api.bouncie.dev/v1';
const BOUNCIE_SCOPE          = 'retrieve_device_info';

let bouncieToken  = null;
let trackingData  = []; // enriched vehicle list
let trackingMap   = null;
let trackingMarkers = [];
let trackingTimer = null;
let mapInitialized = false;

// ── TOKEN MANAGEMENT ──
function getBouncieToken() {
  try {
    const raw = localStorage.getItem('bouncie-token');
    if (!raw) return null;
    const t = JSON.parse(raw);
    if (t.expires_at && Date.now() > t.expires_at) { localStorage.removeItem('bouncie-token'); return null; }
    return t.access_token;
  } catch(e) { return null; }
}

function saveBouncieToken(tokenData) {
  const obj = {
    access_token: tokenData.access_token,
    expires_at: Date.now() + (tokenData.expires_in || 3600) * 1000
  };
  localStorage.setItem('bouncie-token', JSON.stringify(obj));
  bouncieToken = tokenData.access_token;
}

function clearBouncieToken() {
  localStorage.removeItem('bouncie-token');
  bouncieToken = null;
}

// ── OAUTH2 FLOW ──
function startBouncieAuth() {
  // Save current page to return to after auth
  localStorage.setItem('bouncie-return', 'tracking');
  const params = new URLSearchParams({
    response_type: 'code',
    client_id: BOUNCIE_CLIENT_ID,
    redirect_uri: BOUNCIE_REDIRECT_URI,
    scope: BOUNCIE_SCOPE
  });
  window.location.href = BOUNCIE_AUTH_URL + '?' + params.toString();
}

async function exchangeBouncieCode(code) {
  try {
    const r = await fetch(BOUNCIE_TOKEN_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams({
        grant_type: 'authorization_code',
        client_id: BOUNCIE_CLIENT_ID,
        client_secret: BOUNCIE_CLIENT_SECRET,
        code,
        redirect_uri: BOUNCIE_REDIRECT_URI
      })
    });
    if (!r.ok) throw new Error('Token exchange failed: ' + await r.text());
    const data = await r.json();
    saveBouncieToken(data);
    return data.access_token;
  } catch(e) {
    console.error('Bouncie auth error:', e);
    showToast('Bouncie auth failed: ' + e.message, 'error');
    return null;
  }
}

// Check URL for OAuth callback code on page load
function checkBouncieCallback() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  if (code) {
    // Clean URL
    window.history.replaceState({}, document.title, window.location.pathname);
    exchangeBouncieCode(code).then(token => {
      if (token) {
        showToast('Bouncie connected! Loading tracking… ');
        const returnPage = localStorage.getItem('bouncie-return') || 'tracking';
        localStorage.removeItem('bouncie-return');
        navigate(returnPage);
      }
    });
  }
}

// ── BOUNCIE API CALLS ──
async function bouncieGet(endpoint) {
  const token = getBouncieToken();
  if (!token) throw new Error('NOT_AUTHENTICATED');
  const r = await fetch(BOUNCIE_API_URL + endpoint, {
    headers: { 'Authorization': 'Bearer ' + token }
  });
  if (r.status === 401) { clearBouncieToken(); throw new Error('NOT_AUTHENTICATED'); }
  if (!r.ok) throw new Error('API error: ' + r.status);
  return r.json();
}

async function fetchBouncieVehicles() {
  const vehicles = await bouncieGet('/vehicles');
  return vehicles || [];
}

// ── ENRICH BOUNCIE DATA WITH FLEET DATA ──
function enrichVehicles(bouncieVehicles) {
  return bouncieVehicles.map(bv => {
    // Try to match by IMEI stored on car record
    const fleetCar = state.cars.find(c =>
      c.bouncie_imei && c.bouncie_imei === bv.imei
    ) || state.cars.find(c =>
      // Fallback: match by plate if stored
      c.plate && bv.nickName && bv.nickName.toUpperCase().includes(c.plate.toUpperCase().replace('-',''))
    );
    const renter = fleetCar ? carRenter(fleetCar.id) : null;
    const stats = bv.stats || {};
    const lastLocation = stats.lastLocation || {};
    return {
      imei: bv.imei,
      nickname: bv.nickName || bv.imei,
      lat: lastLocation.lat || null,
      lng: lastLocation.lon || null,
      speed: stats.speed || 0,
      isMoving: stats.isMoving || false,
      lastUpdated: lastLocation.timeStamp || null,
      batteryVoltage: stats.batteryVoltage || null,
      fleetCar,
      renter,
      plate: fleetCar?.plate || bv.nickName || 'Unknown'
    };
  });
}

        <button onclick="clearBouncieToken();navigate('tracking')" style="background:transparent;border:1px solid var(--border);color:var(--muted);padding:8px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;">Disconnect</button>

// ── INIT MAP + LOAD DATA ──
async function initTrackingMap() {
  const token = getBouncieToken();
  if (!token) return;

  try {
    showSync('Fetching vehicle locations…');
    const bouncieVehicles = await fetchBouncieVehicles();
    trackingData = enrichVehicles(bouncieVehicles);
    hideSyncBar();
    renderTrackingMap();
    renderTrackingList();
    // Start auto-refresh
    clearInterval(trackingTimer);
    trackingTimer = setInterval(() => {
      if (currentPage === 'tracking') refreshTracking();
    }, 60000);
  } catch(e) {
    hideSyncBar();
    if (e.message === 'NOT_AUTHENTICATED') {
      navigate('tracking'); // Will show auth screen
    } else {
      const mapEl = document.getElementById('tracking-map');
      if (mapEl) mapEl.innerHTML = `<div class="tracking-map-placeholder"><div style="font-size:32px;">!</div><div style="font-size:13px;font-weight:600;color:var(--red);">Could not load vehicles</div><div style="font-size:11px;color:var(--muted);">${esc(e.message)}</div></div>`;
    }
  }
}

async function refreshTracking() {
  if (currentPage !== 'tracking') return;
  try {
    const bouncieVehicles = await fetchBouncieVehicles();
    trackingData = enrichVehicles(bouncieVehicles);
    renderTrackingMap();
    renderTrackingList();
    showToast('Locations updated ✓');
  } catch(e) {
    if (e.message === 'NOT_AUTHENTICATED') navigate('tracking');
  }
}

// ── RENDER GOOGLE MAP WITH PINS ──
function renderTrackingMap() {
  const mapEl = document.getElementById('tracking-map');
  if (!mapEl) return;

  const validVehicles = trackingData.filter(v => v.lat && v.lng);

  if (!validVehicles.length) {
    mapEl.innerHTML = `<div class="tracking-map-placeholder"><div style="font-size:32px;"></div><div style="font-size:13px;font-weight:600;">No location data</div><div style="font-size:11px;color:var(--dim);">Make sure your trackers are powered on</div></div>`;
    return;
  }

  // Wait for Google Maps to load
  if (typeof google === 'undefined' || !google.maps) {
    mapEl.innerHTML = `<div class="tracking-map-placeholder"><div style="font-size:24px;"></div><div style="font-size:13px;">Loading Maps…</div></div>`;
    setTimeout(renderTrackingMap, 1000);
    return;
  }

  // Clear existing map content
  mapEl.innerHTML = '';

  // Create map
  trackingMap = new google.maps.Map(mapEl, {
    zoom: 11,
    center: { lat: validVehicles[0].lat, lng: validVehicles[0].lng },
    mapTypeId: 'roadmap',
    styles: [
      { elementType: 'geometry', stylers: [{ color: '#111111' }] },
      { elementType: 'labels.text.stroke', stylers: [{ color: '#111111' }] },
      { elementType: 'labels.text.fill', stylers: [{ color: '#6B6A90' }] },
      { featureType: 'road', elementType: 'geometry', stylers: [{ color: '#2C2C2C' }] },
      { featureType: 'road', elementType: 'geometry.stroke', stylers: [{ color: '#181818' }] },
      { featureType: 'road', elementType: 'labels.text.fill', stylers: [{ color: '#999999' }] },
      { featureType: 'road.highway', elementType: 'geometry', stylers: [{ color: '#333333' }] },
      { featureType: 'water', elementType: 'geometry', stylers: [{ color: '#080808' }] },
      { featureType: 'poi', stylers: [{ visibility: 'off' }] },
      { featureType: 'transit', stylers: [{ visibility: 'off' }] },
    ],
    disableDefaultUI: false,
    zoomControl: true,
    mapTypeControl: false,
    streetViewControl: false,
    fullscreenControl: true
  });

  // Clear old markers
  trackingMarkers.forEach(m => m.setMap(null));
  trackingMarkers = [];

  const bounds = new google.maps.LatLngBounds();

  validVehicles.forEach(v => {
    const pos = { lat: v.lat, lng: v.lng };
    bounds.extend(pos);

    // Custom colored marker
    const color = v.isMoving ? '#E8E8E8' : '#BBBBBB';
    const label = v.plate || v.nickname || '?';

    const marker = new google.maps.Marker({
      position: pos,
      map: trackingMap,
      title: label,
      icon: {
        path: google.maps.SymbolPath.CIRCLE,
        scale: 10,
        fillColor: color,
        fillOpacity: 1,
        strokeColor: '#fff',
        strokeWeight: 2
      },
      label: {
        text: label.length > 8 ? label.slice(0,8) : label,
        color: '#fff',
        fontSize: '9px',
        fontWeight: '700'
      }
    });

    // Info window on tap
    const infoContent = `
      <div style="background:#181818;color:#F0EEF8;padding:12px;border-radius:8px;min-width:180px;font-family:sans-serif;">
        <div style="font-size:14px;font-weight:800;margin-bottom:4px;">${esc(v.plate || v.nickname)}</div>
        ${v.fleetCar ? `<div style="font-size:12px;color:#6B6A90;">${esc(v.fleetCar.year+' '+v.fleetCar.make+' '+v.fleetCar.model)}</div>` : ''}
        ${v.renter ? `<div style="font-size:12px;color:#E8E8E8;margin-top:4px;">${esc(v.renter.name)}</div>` : ''}
        <div style="font-size:12px;color:#6B6A90;margin-top:4px;">
          ${v.isMoving ? '🟢 Moving · ' + v.speed + ' mph' : '🟡 Parked'}
        </div>
        ${v.lastUpdated ? `<div style="font-size:10px;color:#3A3A50;margin-top:4px;">Updated: ${new Date(v.lastUpdated).toLocaleTimeString()}</div>` : ''}
      </div>`;

    const infoWindow = new google.maps.InfoWindow({ content: infoContent });
    marker.addListener('click', () => {
      trackingMarkers.forEach(m => m.infoWindow?.close());
      infoWindow.open(trackingMap, marker);
    });
    marker.infoWindow = infoWindow;
    trackingMarkers.push(marker);
  });

  // Fit map to show all markers
  if (validVehicles.length > 1) {
    trackingMap.fitBounds(bounds, { padding: 60 });
  }
}

// ── VEHICLE LIST BELOW MAP ──
function renderTrackingList() {
  const el = document.getElementById('tracking-vehicle-list');
  if (!el) return;

  if (!trackingData.length) {
    el.innerHTML = `<div style="text-align:center;padding:24px;color:var(--muted);font-size:13px;">No vehicles found in your Bouncie account.<br><span style="font-size:11px;">Make sure your trackers are registered and powered on.</span></div>`;
    return;
  }

  const moving = trackingData.filter(v => v.isMoving).length;
  const parked = trackingData.filter(v => !v.isMoving && v.lat).length;
  const offline = trackingData.filter(v => !v.lat).length;

  el.innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;">
      <div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center;">
        <div style="font-size:18px;font-weight:800;color:var(--green);">${moving}</div>
        <div style="font-size:10px;color:var(--muted);">Moving</div>
      </div>
      <div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center;">
        <div style="font-size:18px;font-weight:800;color:var(--gold);">${parked}</div>
        <div style="font-size:10px;color:var(--muted);">Parked</div>
      </div>
      <div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center;">
        <div style="font-size:18px;font-weight:800;color:var(--muted);">${offline}</div>
        <div style="font-size:10px;color:var(--muted);">Offline</div>
      </div>
    </div>
    ${trackingData.map((v, i) => `
      <div class="tracking-vehicle-card" onclick="focusVehicle(${i})">
        <div class="tv-dot ${v.lat ? (v.isMoving ? 'online' : '') : 'offline'}" style="${v.lat && !v.isMoving ? 'background:var(--gold);' : ''}"></div>
        <div class="tv-info">
          <div class="tv-name">${esc(v.plate || v.nickname)}</div>
          ${v.fleetCar ? `<div class="tv-location">${esc(v.fleetCar.year+' '+v.fleetCar.make+' '+v.fleetCar.model)}</div>` : ''}
          ${v.renter ? `<div class="tv-meta">${esc(v.renter.name)} · ${esc(v.renter.platform)}</div>` : '<div class="tv-meta" style="color:var(--dim);">No active renter</div>'}
          ${v.lastUpdated ? `<div class="tv-meta">Last seen ${new Date(v.lastUpdated).toLocaleTimeString()}</div>` : '<div class="tv-meta" style="color:var(--red);">No location data</div>'}
        </div>
        <div class="tv-right">
          <div class="tv-speed" style="color:${v.isMoving ? 'var(--green)' : 'var(--gold)'}">
            ${v.lat ? (v.isMoving ? v.speed + ' mph' : 'Parked') : 'Offline'}
          </div>
          ${v.batteryVoltage ? `<div class="tv-time">${v.batteryVoltage}V</div>` : ''}
        </div>
      </div>`).join('')}
    <div style="text-align:center;padding:8px;font-size:10px;color:var(--dim);">
      Tap any vehicle to center map · Auto-refreshes every 60s
    </div>`;
}

function focusVehicle(idx) {
  const v = trackingData[idx];
  if (!v || !v.lat || !trackingMap) return;
  trackingMap.panTo({ lat: v.lat, lng: v.lng });
  trackingMap.setZoom(15);
  if (trackingMarkers[idx]) {
    trackingMarkers[idx].infoWindow?.open(trackingMap, trackingMarkers[idx]);
  }
  // Scroll to map
  document.getElementById('tracking-map')?.scrollIntoView({ behavior: 'smooth' });
}

// ── ADD BOUNCIE IMEI FIELD TO EDIT CAR SHEET ──

function addBouncieImeiToSheet() {
  const notesGroup = document.querySelector('#sheet-container .form-group:last-of-type');
  if (!notesGroup || document.getElementById('f-bouncie-imei')) return;
  const div = document.createElement('div');
  div.className = 'form-group';
  div.innerHTML = '<label class="form-label">Bouncie Device IMEI <span style="color:var(--dim);font-weight:400;">(links to tracker)</span></label><input class="form-input" id="f-bouncie-imei" placeholder="e.g. 123456789012345" inputmode="numeric">';
  notesGroup.parentNode.insertBefore(div, notesGroup.nextSibling);
}
